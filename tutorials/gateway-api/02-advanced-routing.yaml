---
# 02-advanced-routing.yaml
# Advanced routing examples: multiple paths and header-based routing
#
# This demonstrates:
# 1. Path-based routing: /api -> api-app, / -> http-app
# 2. Header-based routing: X-Version header matching
# 3. Multiple hostnames
#
# Apply with: kubectl apply -f 02-advanced-routing.yaml -n demo-apps
# Prerequisites: Sample apps already deployed (06-sample-apps.yaml)

# Example 1: Path-based routing
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: path-based-route
  namespace: demo-apps
spec:
  parentRefs:
  - name: demo-gateway
    kind: Gateway
  hostnames:
  - "demo.localhost"
  rules:
  # Rule 1: /api/* goes to api-app
  - matches:
    - path:
        type: PathPrefix
        value: /api
    backendRefs:
    - name: api-app
      port: 8080
  # Rule 2: /* goes to http-app (default)
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: http-app
      port: 8080

---
# Example 2: Header-based routing
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: header-based-route
  namespace: demo-apps
spec:
  parentRefs:
  - name: demo-gateway
    kind: Gateway
  hostnames:
  - "header-routing.localhost"
  rules:
  # Route based on X-Version header
  - matches:
    - headers:
      - name: X-Version
        value: v2
      path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: api-app
      port: 8080
  # Default route
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: http-app
      port: 8080

---
# Example 3: Multiple hostnames
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: multi-host-route
  namespace: demo-apps
spec:
  parentRefs:
  - name: demo-gateway
    kind: Gateway
  hostnames:
  - "app.localhost"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: http-app
      port: 8080

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: api-host-route
  namespace: demo-apps
spec:
  parentRefs:
  - name: demo-gateway
    kind: Gateway
  hostnames:
  - "api.localhost"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: api-app
      port: 8080

---
# Testing path-based routing:
# curl -H "Host: demo.localhost" http://localhost:8080/
# curl -H "Host: demo.localhost" http://localhost:8080/api
#
# Testing header-based routing:
# curl -H "Host: header-routing.localhost" http://localhost:8080/
# curl -H "Host: header-routing.localhost" -H "X-Version: v2" http://localhost:8080/
#
# Testing multi-host:
# curl -H "Host: app.localhost" http://localhost:8080/
# curl -H "Host: api.localhost" http://localhost:8080/
