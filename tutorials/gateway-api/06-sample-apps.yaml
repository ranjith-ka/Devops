---
# 06-sample-apps.yaml
# Deploy sample applications for testing Gateway API
# 
# This creates:
# 1. http-app: Simple HTTP echo service (2 replicas)
# 2. api-app: API echo service
#
# Apply with: kubectl apply -f 06-sample-apps.yaml
# Prerequisites: kubectl create namespace demo-apps

apiVersion: apps/v1
kind: Deployment
metadata:
  name: http-app
  namespace: demo-apps
  labels:
    app: http-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: http-app
  template:
    metadata:
      labels:
        app: http-app
    spec:
      containers:
      - name: app
        image: hashicorp/http-echo:latest
        args:
          - "-listen=:8080"
          - "-text=Hello from HTTP App! 🚀"
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 128Mi

---
apiVersion: v1
kind: Service
metadata:
  name: http-app
  namespace: demo-apps
spec:
  selector:
    app: http-app
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-app
  namespace: demo-apps
  labels:
    app: api-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-app
  template:
    metadata:
      labels:
        app: api-app
    spec:
      containers:
      - name: app
        image: hashicorp/http-echo:latest
        args:
          - "-listen=:8080"
          - "-text=API Response - v1"
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 128Mi

---
apiVersion: v1
kind: Service
metadata:
  name: api-app
  namespace: demo-apps
spec:
  selector:
    app: api-app
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
  type: ClusterIP

---
# Verification:
# kubectl get pods -n demo-apps
# kubectl get svc -n demo-apps
# kubectl logs -n demo-apps -l app=http-app --tail=10
